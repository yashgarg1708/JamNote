services:
  - type: web
    name: jamnotes
    runtime: node
    autoDeploy: true
    buildCommand: npm ci --include=dev --prefix front_end && npm run build --prefix front_end && npm ci --include=dev --prefix back_end && npm run build --prefix back_end
    startCommand: npm start --prefix back_end
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
